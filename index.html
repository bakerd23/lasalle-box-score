<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Salle Men's Basketball Practice Box Score</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .dark-mode {
            background-color: #0a1628 !important;
        }

        .light-mode {
            background-color: #f9fafb !important;
        }
    </style>
</head>
<body class="dark-mode">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCBVvuoOJ89OitlS1rhYAU_Z2JjQN3NqyI",
            authDomain: "lasalle-hustle-chart.firebaseapp.com",
            databaseURL: "https://lasalle-hustle-chart-default-rtdb.firebaseio.com",
            projectId: "lasalle-hustle-chart",
            storageBucket: "lasalle-hustle-chart.firebasestorage.app",
            messagingSenderId: "141389844466",
            appId: "1:141389844466:web:3f9f43c2c129242887256b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const players = [
            { number: 0, lastName: "Burton" },
            { number: 2, lastName: "Dockery" },
            { number: 3, lastName: "Smith" },
            { number: 4, lastName: "Booker" },
            { number: 5, lastName: "Finkley" },
            { number: 7, lastName: "Collier" },
            { number: 8, lastName: "Moss" },
            { number: 10, lastName: "Johnson" },
            { number: 11, lastName: "Zanki" },
            { number: 12, lastName: "Nkoy-Eale" },
            { number: 13, lastName: "Lipacis" },
            { number: 14, lastName: "Rink" },
            { number: 21, lastName: "Webb" },
            { number: 23, lastName: "Mboudjika" },
            { number: 24, lastName: "Brewer" },
            { number: 25, lastName: "Beatty" },
            { number: 28, lastName: "Masharaliyev" },
            { number: 30, lastName: "Lynam" }
        ];

        const statCategories = {
            "Shooting": ["Missed 2", "Made 2", "Missed 3", "Made 3", "Missed FT", "Made FT"],
            "Offense": ["Offensive Rebound", "Assist", "Turnover", "Foul Drawn"],
            "Defense": ["Defensive Rebound", "Foul Committed", "Steal", "Blocked Shot", "Charge Drawn"]
        };

        const categoryStyles = {
            "Shooting": { header: "bg-blue-800 text-white", card: "border-blue-800/40" },
            "Offense": { header: "bg-amber-500 text-blue-950", card: "border-amber-500/40" },
            "Defense": { header: "bg-slate-600 text-white", card: "border-slate-600/40" }
        };

        const allStats = Object.values(statCategories).flat();

        // Derives points and shooting percentages from raw made/missed counts.
        const computeLine = (stats) => {
            const made2 = stats["Made 2"] || 0;
            const missed2 = stats["Missed 2"] || 0;
            const made3 = stats["Made 3"] || 0;
            const missed3 = stats["Missed 3"] || 0;
            const madeFT = stats["Made FT"] || 0;
            const missedFT = stats["Missed FT"] || 0;
            const attempts2 = made2 + missed2;
            const attempts3 = made3 + missed3;
            const attemptsFT = madeFT + missedFT;
            const fgm = made2 + made3;
            const fga = attempts2 + attempts3;
            return {
                points: made2 * 2 + made3 * 3 + madeFT,
                fg2pct: attempts2 > 0 ? (made2 / attempts2) * 100 : null,
                fg3pct: attempts3 > 0 ? (made3 / attempts3) * 100 : null,
                ftpct: attemptsFT > 0 ? (madeFT / attemptsFT) * 100 : null,
                fgpct: fga > 0 ? (fgm / fga) * 100 : null,
                made2, attempts2, made3, attempts3, madeFT, attemptsFT, fgm, fga
            };
        };

        const fmtPct = (pct) => pct === null ? '—' : `${pct.toFixed(1)}%`;

        const BoxScoreInput = () => {
            const [practiceDate, setPracticeDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedPlayer, setSelectedPlayer] = useState(null);
            const [playerStats, setPlayerStats] = useState({});
            const [saveStatus, setSaveStatus] = useState('saved');
            const [darkMode, setDarkMode] = useState(true);

            useEffect(() => {
                document.body.className = darkMode ? 'dark-mode' : 'light-mode';
            }, [darkMode]);

            const getPlayerKey = (playerNumber) => `${practiceDate}-${playerNumber}`;

            const getStatValue = useCallback((playerNumber, stat) => {
                const key = getPlayerKey(playerNumber);
                return playerStats[key]?.[stat] || 0;
            }, [playerStats, practiceDate]);

            const loadExistingData = useCallback(async () => {
                try {
                    const practiceDoc = db.collection('practiceSummaries').doc(practiceDate);
                    const practiceSnapshot = await practiceDoc.get();

                    if (practiceSnapshot.exists) {
                        const currentData = practiceSnapshot.data();
                        const loadedPlayerStats = {};

                        Object.entries(currentData.playerStats || {}).forEach(([playerKey, stats]) => {
                            const playerNumber = parseInt(playerKey.replace('player_', ''));
                            const key = getPlayerKey(playerNumber);
                            loadedPlayerStats[key] = { ...stats };
                        });

                        setPlayerStats(loadedPlayerStats);
                    } else {
                        setPlayerStats({});
                    }
                } catch (error) {
                    console.error('Error loading existing data:', error);
                }
            }, [practiceDate]);

            useEffect(() => {
                loadExistingData();
            }, [loadExistingData]);

            const saveToFirebase = useCallback(async (eventData) => {
                try {
                    setSaveStatus('saving');

                    const practiceDoc = db.collection('practiceSummaries').doc(practiceDate);
                    const practiceSnapshot = await practiceDoc.get();

                    if (practiceSnapshot.exists) {
                        const currentData = practiceSnapshot.data();
                        const playerKey = `player_${eventData.playerNumber}`;
                        const currentPlayerStats = currentData.playerStats?.[playerKey] || {};
                        const newStatValue = (currentPlayerStats[eventData.stat] || 0) + eventData.change;

                        await practiceDoc.update({
                            [`playerStats.${playerKey}.${eventData.stat}`]: Math.max(0, newStatValue),
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        await practiceDoc.set({
                            practiceDate,
                            playerStats: {
                                [`player_${eventData.playerNumber}`]: {
                                    [eventData.stat]: Math.max(0, eventData.change)
                                }
                            },
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }

                    setSaveStatus('saved');
                } catch (error) {
                    console.error('Error saving to Firebase:', error);
                    setSaveStatus('error');
                    setTimeout(() => setSaveStatus('saved'), 3000);
                }
            }, [practiceDate]);

            const updateStat = useCallback((playerNumber, stat, change) => {
                const key = getPlayerKey(playerNumber);

                setPlayerStats(prev => {
                    const newStats = { ...prev };
                    if (!newStats[key]) {
                        newStats[key] = {};
                    }

                    const currentValue = newStats[key][stat] || 0;
                    const newValue = Math.max(0, currentValue + change);
                    newStats[key] = { ...newStats[key], [stat]: newValue };

                    return newStats;
                });

                saveToFirebase({ playerNumber, stat, change });
            }, [practiceDate, saveToFirebase]);

            const StatSpinner = ({ playerNumber, stat }) => {
                const value = getStatValue(playerNumber, stat);

                return (
                    <div className={`flex items-center justify-between p-3 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                        <div className={`text-sm font-medium ${darkMode ? 'text-gray-200' : 'text-gray-800'}`}>{stat}</div>
                        <div className="flex items-center gap-2">
                            <button
                                onClick={() => updateStat(playerNumber, stat, -1)}
                                disabled={value === 0}
                                className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-white transition-colors ${
                                    value === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-gray-500 hover:bg-gray-600 active:bg-gray-700'
                                }`}
                            >−</button>
                            <div className={`w-8 text-center font-bold text-lg ${darkMode ? 'text-white' : 'text-gray-800'}`}>{value}</div>
                            <button
                                onClick={() => updateStat(playerNumber, stat, 1)}
                                className="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white bg-blue-800 hover:bg-blue-900 active:bg-blue-950 transition-colors"
                            >+</button>
                        </div>
                    </div>
                );
            };

            const getSaveStatusDisplay = () => {
                switch (saveStatus) {
                    case 'saving':
                        return { color: 'text-amber-500', dot: 'bg-amber-500', text: 'Saving...' };
                    case 'error':
                        return { color: 'text-red-600', dot: 'bg-red-500', text: 'Save error' };
                    default:
                        return { color: 'text-green-600', dot: 'bg-green-500', text: 'Saved to cloud' };
                }
            };

            const statusDisplay = getSaveStatusDisplay();

            const selectedPlayerObj = players.find(p => p.number === selectedPlayer);
            const selectedLine = selectedPlayer !== null
                ? computeLine(playerStats[getPlayerKey(selectedPlayer)] || {})
                : null;

            return (
                <div className="max-w-6xl mx-auto p-4 min-h-screen">
                    {/* Header */}
                    <div className={`rounded-lg shadow-md p-6 mb-6 border-t-4 border-amber-500 ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                            <h1 className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-blue-900'}`}>La Salle Men's Basketball Practice Box Score</h1>
                            <div className="flex flex-wrap items-center gap-4">
                                <button
                                    onClick={() => setDarkMode(prev => !prev)}
                                    className={`px-3 py-2 rounded-md transition-colors ${darkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-200 text-gray-800 hover:bg-gray-300'}`}
                                >{darkMode ? '☀️ Light' : '🌙 Dark'}</button>
                                <div className="flex items-center gap-2">
                                    <label className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Practice Date:</label>
                                    <input
                                        type="date"
                                        value={practiceDate}
                                        onChange={(e) => setPracticeDate(e.target.value)}
                                        className={`px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500 ${darkMode ? 'border-gray-600 bg-gray-700 text-white' : 'border-gray-300 bg-white text-gray-900'}`}
                                    />
                                </div>
                                <div className={`flex items-center gap-2 text-sm ${statusDisplay.color} min-w-32`}>
                                    <div className={`w-2 h-2 ${statusDisplay.dot} rounded-full ${saveStatus === 'saving' ? 'animate-pulse' : ''}`}></div>
                                    <span>{statusDisplay.text}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Player Selection */}
                    <div className={`rounded-lg shadow-md p-6 mb-6 ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                        <h2 className={`text-xl font-semibold mb-4 ${darkMode ? 'text-white' : 'text-gray-800'}`}>Select Player</h2>
                        <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
                            {players.map((player) => (
                                <button
                                    key={player.number}
                                    onClick={() => setSelectedPlayer(player.number)}
                                    className={`p-4 rounded-lg border-2 transition-all font-semibold text-lg ${
                                        selectedPlayer === player.number
                                            ? 'border-amber-500 bg-blue-900 text-white shadow-md scale-105'
                                            : darkMode
                                            ? 'border-gray-600 bg-gray-700 text-gray-200 hover:border-gray-500 hover:bg-gray-600'
                                            : 'border-gray-200 bg-white text-gray-700 hover:border-gray-300 hover:bg-gray-50'
                                    }`}
                                >
                                    <div className="text-2xl font-bold">{player.number}</div>
                                    <div className="text-sm">{player.lastName}</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Stats Input or Empty State */}
                    {selectedPlayer !== null ? (
                        <div className={`rounded-lg shadow-md p-6 ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-4">
                                <h2 className={`text-xl font-semibold ${darkMode ? 'text-white' : 'text-gray-800'}`}>
                                    Stats for #{selectedPlayerObj.number} {selectedPlayerObj.lastName}
                                </h2>
                                <div className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                    {selectedLine.points} PTS &nbsp;|&nbsp;
                                    2P: {selectedLine.made2}-{selectedLine.attempts2} ({fmtPct(selectedLine.fg2pct)}) &nbsp;|&nbsp;
                                    3P: {selectedLine.made3}-{selectedLine.attempts3} ({fmtPct(selectedLine.fg3pct)}) &nbsp;|&nbsp;
                                    FT: {selectedLine.madeFT}-{selectedLine.attemptsFT} ({fmtPct(selectedLine.ftpct)}) &nbsp;|&nbsp;
                                    FG: {selectedLine.fgm}-{selectedLine.fga} ({fmtPct(selectedLine.fgpct)})
                                </div>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {Object.entries(statCategories).map(([category, stats]) => (
                                    <div key={category} className="space-y-3">
                                        <h3 className={`text-lg font-semibold text-center py-2 px-4 rounded-lg ${categoryStyles[category].header}`}>
                                            {category}
                                        </h3>
                                        {stats.map((stat) => (
                                            <StatSpinner key={stat} playerNumber={selectedPlayer} stat={stat} />
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className={`rounded-lg shadow-md p-12 text-center ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                            <div className={`text-lg ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Select a player to start tracking box score stats</div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<BoxScoreInput />, document.getElementById('root'));
    </script>
</body>
</html>
